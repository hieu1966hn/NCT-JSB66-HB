<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS4</title>
    <!-- Đây là nơi nhúng CSS External -->
    <link rel="stylesheet" href="./SS4.css">

    <style>
        /* Đây là nơi sử dụng Internal CSS */
        h1 {
            color: blue;
        }

        /* Khởi tạo ID Selector */
        #hello {
            color: blueviolet;
            background-color: black;
            font-size: larger;
            font-family: 'Times New Roman', Times, serif;
        }

        /* Khởi tạo Class Selector */
        .square {
            width: 300px;
            height: 300px;
            background-color: coral;
        }

        .circle {
            background-color: rgb(40, 89, 225);
            width: 300px;
            height: 300px;
            border-radius: 50%;
        }
    </style>
</head>

<body>
